version: '3.8'
services:
  app:
    build: .
    ports:
      - "5001:5001"
    environment:
      - SOCKETIO_ASYNC_MODE=eventlet
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app:rw
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
      - /dev/ttyUSB2:/dev/ttyUSB2
      - /dev/ttyUSB3:/dev/ttyUSB3
    restart: unless-stopped
